[tool.uv.workspace]
members = [
    "packages/shared",
    "packages/daemon",
    "packages/orchestrator",
]

# Dépendances de dev communes aux trois packages Python.
# Elles s'installent avec `uv sync --all-packages`.
[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.10",
]

# Note : le package `desktop/` n'est PAS dans le workspace uv.
# C'est un projet Node géré par pnpm (voir pnpm-workspace.yaml).

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]  # géré par le formatter

[tool.pytest.ini_options]
testpaths = ["packages/shared/tests", "packages/daemon/tests", "packages/orchestrator/tests"]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"